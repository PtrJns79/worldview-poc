<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECTOR_MATRIX // WORLDVIEW</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <link rel="stylesheet" href="test-style.css">
</head>
<body>

<header id="tools-header">
    <span id="sys-title">WORLDVIEW // SECTOR_MATRIX</span>
    <div id="header-controls">
        <button id="refresh-btn" class="tool-btn">REFRESH_FLIGHTS</button>
        <button id="zoom-in"     class="tool-btn">ZOOM_IN</button>
        <button id="zoom-out"    class="tool-btn">ZOOM_OUT</button>
        <button id="screenshot-btn" class="tool-btn primary">COPY_ALL</button>
    </div>
    <div id="header-status">
        <span id="status-master">MASTER: MAP_A</span>
        <span id="status-alt">ALT: 25.0KM</span>
    </div>
</header>

<div class="test-grid">
    <div class="pane"><div id="map-a" class="map"></div></div>
    <div class="pane"><div id="map-b" class="map"></div></div>
    <div class="pane"><div id="map-c" class="map"></div></div>
    <div class="pane"><div id="map-d" class="map"></div></div>
</div>

<!-- Layer modules — order matters, registry loaded last -->
<script src="layers/flights.js"></script>
<script src="layers/weather.js"></script>
<script src="layers/airspace.js"></script>
<script src="layers/terrain.js"></script>
<script src="layer-registry.js"></script>
<script src="test-logic.js"></script>

</body>
</html>
