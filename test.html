<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECTOR_MATRIX // WORLDVIEW</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        *, *::before, *::after { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden;
            display: flex; flex-direction: column;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
        }
        #tools-header {
            height: 48px; background: #050505;
            border-bottom: 1px solid #1a3a1a;
            display: flex; align-items: center;
            padding: 0 16px; gap: 6px; flex-shrink: 0;
        }
        #sys-title {
            color: #00ff41; font-size: 13px; letter-spacing: 0.1em;
            text-shadow: 0 0 8px #00ff4166; margin-right: 10px;
        }
        .tool-btn {
            padding: 6px 10px; background: transparent;
            color: #00cc33; border: 1px solid #1a4a1a;
            font-family: inherit; font-size: 10px; cursor: pointer;
            letter-spacing: 0.05em; transition: all 0.15s ease;
        }
        .tool-btn:hover { background: #0a2a0a; border-color: #00cc33; color: #00ff41; }
        .tool-btn.active { background: #003300; border-color: #00ff41; color: #00ff41; box-shadow: 0 0 6px #00ff4133; }
        .tool-btn.inactive { opacity: 0.4; }
        .tool-btn.primary { border-color: #00cc33; color: #00ff41; }
        .tool-btn.primary:hover { background: #00cc33; color: #000; }
        .sep { width: 1px; height: 24px; background: #1a3a1a; margin: 0 4px; }
        #header-status {
            margin-left: auto; display: flex; gap: 16px;
            color: #00cc33; font-size: 11px; opacity: 0.8;
        }
        .test-grid {
            display: grid;
            grid-template-columns: 50% 50%;
            grid-template-rows: 100%;
            width: 100vw; height: calc(100vh - 48px); overflow: hidden;
        }
        .pane {
            position: relative;
            border: 0.5px solid #0d200d; overflow: hidden;
            display: flex; flex-direction: column;
        }
        #pane-a { grid-column: 1; grid-row: 1; }
        #pane-b { grid-column: 2; grid-row: 1; }

        /* ── PER-PANE SUB-HEADER ─────────────────────────── */
        .pane-header {
            height: 34px; flex-shrink: 0;
            background: #030a03;
            border-bottom: 1px solid #0d200d;
            display: flex; align-items: center;
            padding: 0 8px; gap: 4px;
            z-index: 150;
        }
        .pane-header-label {
            color: #336633; font-size: 9px; letter-spacing: 0.1em;
            margin-right: 6px; white-space: nowrap;
        }
        /* Map style selector buttons */
        .map-style-btn {
            padding: 3px 8px;
            background: transparent;
            color: #336633; border: 1px solid #0d200d;
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px; cursor: pointer; letter-spacing: 0.04em;
            transition: all 0.15s ease; white-space: nowrap;
        }
        .map-style-btn:hover  { background: #0a1a0a; border-color: #336633; color: #00cc33; }
        .map-style-btn.active { background: #001a00; border-color: #00cc33; color: #00ff41; }

        .map-wrapper {
            position: relative; flex: 1; overflow: hidden;
        }
        .map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .pane-label {
            position: absolute; top: 10px; left: 10px;
            color: #00cc33; font-family: 'Share Tech Mono', monospace;
            font-size: 11px; background: rgba(0,0,0,0.8);
            padding: 3px 8px; border: 1px solid #1a4a1a;
            z-index: 100; pointer-events: none; letter-spacing: 0.08em;
        }
        .map-wrapper::after {
            content: ''; position: absolute; inset: 0;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
            z-index: 50; pointer-events: none;
        }
        .cesium-widget-credits,
        .cesium-viewer-toolbar { display: none !important; }

        /* ── COLLAPSIBLE CONTROL PANELS ──────────────────── */
        .ctrl-tab {
            position: absolute; bottom: 60px; right: 0;
            z-index: 200; writing-mode: vertical-rl;
            transform: rotate(180deg);
            padding: 10px 5px;
            background: rgba(0,20,0,0.92);
            color: #00cc33; border: 1px solid #1a4a1a;
            border-right: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; cursor: pointer; letter-spacing: 0.1em;
            transition: all 0.15s ease;
            user-select: none;
        }
        .ctrl-tab:hover { background: rgba(0,40,0,0.97); color: #00ff41; border-color: #00cc33; }

        .ctrl-panel {
            position: absolute; top: 0; right: -220px;
            width: 210px; height: 100%;
            background: rgba(2,10,2,0.93);
            border-left: 1px solid #1a4a1a;
            z-index: 199;
            display: flex; flex-direction: column;
            padding: 12px 10px; gap: 6px;
            overflow-y: auto;
            transition: right 0.2s ease;
            backdrop-filter: blur(4px);
        }
        .ctrl-panel.open { right: 0; }

        .ctrl-section-label {
            color: #336633; font-size: 9px; letter-spacing: 0.12em;
            margin-top: 8px; margin-bottom: 2px;
            border-bottom: 1px solid #0d200d; padding-bottom: 4px;
        }
        .ctrl-section-label:first-child { margin-top: 0; }

        .pane-btn {
            padding: 5px 10px;
            background: rgba(0,0,0,0.5);
            color: #00cc33; border: 1px solid #1a4a1a;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; cursor: pointer; letter-spacing: 0.04em;
            transition: all 0.15s ease; text-align: left; width: 100%;
        }
        .pane-btn:hover  { background: rgba(0,40,0,0.95); border-color: #00cc33; color: #00ff41; }
        .pane-btn.active { background: rgba(0,55,0,0.95); border-color: #00ff41; color: #00ff41; }
        .pane-btn.inactive { opacity: 0.45; }

        /* ── INFO OVERLAY ────────────────────────────────── */
        .info-overlay {
            position: absolute; bottom: 10px; left: 10px;
            z-index: 100; min-width: 190px; max-width: 240px;
            background: rgba(2,8,2,0.88);
            border: 1px solid #0d280d;
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px; line-height: 1.6;
            pointer-events: none;
            backdrop-filter: blur(2px);
        }
        .info-overlay-head {
            padding: 3px 8px;
            background: rgba(0,20,0,0.7);
            border-bottom: 1px solid #0d280d;
            color: #336633; letter-spacing: 0.1em; font-size: 8px;
        }
        .info-overlay-body { padding: 5px 8px; }
        .info-row {
            display: flex; gap: 6px;
            padding: 1px 0; border-bottom: 1px solid #0a180a;
        }
        .info-row:last-child { border-bottom: none; }
        .info-key { color: #265526; min-width: 52px; flex-shrink: 0; }
        .info-val { color: #00aa22; word-break: break-all; }
        .info-val.active { color: #00ff41; }
        .info-divider {
            padding: 2px 8px; color: #1a3a1a;
            border-bottom: 1px solid #0a180a;
            font-size: 8px; letter-spacing: 0.08em;
        }

        /* ── AIRCRAFT POPUP ──────────────────────────────── */
        #aircraft-popup {
            display: none;
            position: fixed; top: 60px; right: 16px;
            width: 280px; background: #050505;
            border: 1px solid #00cc33;
            z-index: 1000; font-family: 'Share Tech Mono', monospace;
            box-shadow: 0 0 20px rgba(0,255,65,0.15);
        }
        #aircraft-popup.visible { display: block; }
        #popup-header {
            background: #001a00; padding: 8px 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1a4a1a;
        }
        #popup-callsign { color: #00ff41; font-size: 13px; letter-spacing: 0.1em; }
        #popup-close {
            color: #00cc33; cursor: pointer; font-size: 16px; line-height: 1;
            background: none; border: none; font-family: inherit; padding: 0;
        }
        #popup-close:hover { color: #00ff41; }
        #popup-photo {
            width: 100%; height: 160px; object-fit: cover;
            display: block; background: #0a0a0a;
        }
        #popup-photo-credit {
            font-size: 9px; color: #336633; padding: 3px 8px;
            border-bottom: 1px solid #0d200d; text-align: right;
        }
        #popup-body { padding: 10px 12px; }
        .popup-row {
            display: flex; justify-content: space-between;
            padding: 3px 0; border-bottom: 1px solid #0d200d;
            font-size: 10px;
        }
        .popup-row:last-child { border-bottom: none; }
        .popup-key { color: #336633; }
        .popup-val { color: #00cc33; text-align: right; max-width: 160px; word-break: break-all; }
        #popup-loading {
            padding: 20px; text-align: center;
            color: #336633; font-size: 11px;
        }
    </style>
</head>
<body>

<header id="tools-header">
    <span id="sys-title">WORLDVIEW // SECTOR_MATRIX</span>
    <div class="sep"></div>
    <button id="zoom-in"        class="tool-btn" onclick="handleZoom('in')">ZOOM_IN</button>
    <button id="zoom-out"       class="tool-btn" onclick="handleZoom('out')">ZOOM_OUT</button>
    <button id="screenshot-btn" class="tool-btn primary" onclick="takeScreenshot()">COPY_ALL</button>
    <div id="header-status">
        <span id="status-master">MASTER: MAP_A</span>
        <span id="status-alt">ALT: 25.0KM</span>
    </div>
</header>

<div class="test-grid">

    <!-- PANE A: FLIGHTS + AIRSPACE -->
    <div class="pane" id="pane-a">
        <div class="pane-header">
            <span class="pane-header-label">BASE:</span>
            <button class="map-style-btn active" id="style-a-satellite" onclick="setBaseMap('a','satellite',this)">SATELLITE</button>
            <button class="map-style-btn" id="style-a-positron"  onclick="setBaseMap('a','positron',this)">POSITRON</button>
            <button class="map-style-btn" id="style-a-voyager"   onclick="setBaseMap('a','voyager',this)">VOYAGER</button>
            <button class="map-style-btn" id="style-a-street"    onclick="setBaseMap('a','street',this)">STREET</button>
            <button class="map-style-btn" id="style-a-topo"      onclick="setBaseMap('a','topo',this)">TOPO</button>
            <button class="map-style-btn" id="style-a-dark"      onclick="setBaseMap('a','dark',this)">DARK</button>
        </div>
        <div class="map-wrapper">
            <div id="map-a" class="map"></div>
            <div class="ctrl-tab" onclick="togglePanel('panel-a')">LAYERS</div>
            <div class="ctrl-panel" id="panel-a">
                <div class="ctrl-section-label">FLIGHT DATA</div>
                <button id="btn-flights"  class="pane-btn inactive" onclick="toggleLayer('flights')">● FLIGHTS</button>
                <button id="refresh-btn"  class="pane-btn"          onclick="manualRefreshFlights()">↺ REFRESH</button>
                <button id="btn-details"  class="pane-btn inactive" onclick="toggleDetails()">◈ DETAILS ON LABEL</button>
                <div class="ctrl-section-label">AIRSPACE</div>
                <button id="btn-airspace" class="pane-btn active"   onclick="toggleLayer('airspace')">● AIRSPACE CTRs</button>
            </div>
            <div class="info-overlay" id="info-a">
                <div class="info-overlay-head">MAP_A // SOURCE INFO</div>
                <div class="info-overlay-body" id="info-a-body"></div>
            </div>
        </div>
    </div>

    <!-- PANE B: SATELLITE + WEATHER -->
    <div class="pane" id="pane-b">
        <div class="pane-header">
            <span class="pane-header-label">BASE:</span>
            <button class="map-style-btn active" id="style-b-satellite" onclick="setBaseMap('b','satellite',this)">SATELLITE</button>
            <button class="map-style-btn" id="style-b-positron"  onclick="setBaseMap('b','positron',this)">POSITRON</button>
            <button class="map-style-btn" id="style-b-voyager"   onclick="setBaseMap('b','voyager',this)">VOYAGER</button>
            <button class="map-style-btn" id="style-b-street"    onclick="setBaseMap('b','street',this)">STREET</button>
            <button class="map-style-btn" id="style-b-topo"      onclick="setBaseMap('b','topo',this)">TOPO</button>
            <button class="map-style-btn" id="style-b-dark"      onclick="setBaseMap('b','dark',this)">DARK</button>
        </div>
        <div class="map-wrapper">
            <div id="map-b" class="map"></div>
            <div class="ctrl-tab" onclick="togglePanel('panel-b')">LAYERS</div>
            <div class="ctrl-panel" id="panel-b">
                <div class="ctrl-section-label">BASE MAP</div>
                <button id="btn-terrain" class="pane-btn active" onclick="toggleLayer('terrain')">● ROADS OVERLAY</button>
                <div class="ctrl-section-label">OWM // PRECIPITATION</div>
                <button id="btn-weather-precipitation_new"      class="pane-btn inactive" onclick="toggleWeather('precipitation_new')">● PRECIPITATION</button>
                <button id="btn-weather-precipitation_classic"  class="pane-btn inactive" onclick="toggleWeather('precipitation_classic')">● PRECIP CLASSIC</button>
                <button id="btn-weather-rain_new"               class="pane-btn inactive" onclick="toggleWeather('rain_new')">● RAIN</button>
                <button id="btn-weather-rain_classic"           class="pane-btn inactive" onclick="toggleWeather('rain_classic')">● RAIN CLASSIC</button>
                <button id="btn-weather-snow"                   class="pane-btn inactive" onclick="toggleWeather('snow')">● SNOW</button>
                <div class="ctrl-section-label">OWM // ATMOSPHERE</div>
                <button id="btn-weather-clouds_new"             class="pane-btn inactive" onclick="toggleWeather('clouds_new')">● CLOUD COVER</button>
                <button id="btn-weather-clouds_classic"         class="pane-btn inactive" onclick="toggleWeather('clouds_classic')">● CLOUD CLASSIC</button>
                <button id="btn-weather-pressure_new"           class="pane-btn inactive" onclick="toggleWeather('pressure_new')">● PRESSURE</button>
                <button id="btn-weather-pressure_cntr"          class="pane-btn inactive" onclick="toggleWeather('pressure_cntr')">● PRESSURE CONTOUR</button>
                <button id="btn-weather-wind_new"               class="pane-btn inactive" onclick="toggleWeather('wind_new')">● WIND SPEED</button>
                <div class="ctrl-section-label">OWM // SURFACE</div>
                <button id="btn-weather-temp_new"               class="pane-btn inactive" onclick="toggleWeather('temp_new')">● TEMPERATURE</button>
            </div>
            <div class="info-overlay" id="info-b">
                <div class="info-overlay-head">MAP_B // SOURCE INFO</div>
                <div class="info-overlay-body" id="info-b-body"></div>
            </div>
        </div>
    </div>

</div>

<!-- Aircraft detail popup -->
<div id="aircraft-popup">
    <div id="popup-header">
        <span id="popup-callsign">---</span>
        <button id="popup-close" onclick="closePopup()">✕</button>
    </div>
    <div id="popup-loading">FETCHING DATA...</div>
    <img id="popup-photo" style="display:none" alt="Aircraft photo" />
    <div id="popup-photo-credit"></div>
    <div id="popup-body"></div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
Cesium.Ion.defaultAccessToken = '';

const LONDON = Cesium.Cartesian3.fromDegrees(-0.1276, 51.5072, 25000.0);
const LOOK_DOWN = { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 };

const viewers = {};
let activeMaster = 'map-a';
let OWM_KEY = '';  // loaded from key file on boot

// flights off by default — preserve API credits
const layerEnabled = { flights: false, airspace: true, terrain: true };

// ─── LAYER: FLIGHTS ───────────────────────────────────────────────────────────
const FlightsLayer = {
    id: 'flights',
    _entities: [],
    _viewer: null,
    _detailsEnabled: false,
    _metadataCache: {}, // icao24 -> metadata, avoid re-fetching

    init(viewer) {
        this._viewer = viewer;
        this._setupClickHandler();
        console.log('[flights] standby — disabled by default');
    },

    _setupClickHandler() {
        const v = this._viewer;
        if (!v) return;
        const handler = new Cesium.ScreenSpaceEventHandler(v.scene.canvas);
        handler.setInputAction((click) => {
            const picked = v.scene.pick(click.position);
            if (!picked || !picked.id) return;
            const props = picked.id.properties;
            if (!props || !props.layer || props.layer.getValue() !== 'flights') return;
            openPopup(picked.id);
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
    },

    async refresh() {
        const v = this._viewer;
        if (!v) return;
        this._entities.forEach(e => v.entities.remove(e));
        this._entities = [];

        const url = 'https://opensky-network.org/api/states/all?lamin=51.2&lomin=-0.8&lamax=51.9&lomax=0.6';
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (!data.states) return { count: 0 };

            data.states.forEach(p => {
                const icao24   = p[0] || '';
                const callsign = (p[1] || 'UNKNWN').trim();
                const country  = p[2] || '?';
                const lon      = p[5], lat = p[6];
                const alt      = p[7] || 1000;
                const onGround = p[8] || false;
                const speed    = p[9] ? Math.round(p[9] * 1.944) : 0;
                const heading  = p[10] || 0;
                if (!lon || !lat) return;

                // Heading arrow using billboard with rotation
                const headingRad = Cesium.Math.toRadians(heading);
                const e = v.entities.add({
                    position: Cesium.Cartesian3.fromDegrees(lon, lat, alt),
                    billboard: {
                        image: this._makeArrowCanvas(onGround),
                        rotation: -headingRad,
                        alignedAxis: Cesium.Cartesian3.UNIT_Z,
                        width: 20, height: 20,
                        color: onGround
                            ? Cesium.Color.YELLOW
                            : Cesium.Color.LIME,
                        pixelOffset: new Cesium.Cartesian2(0, 0)
                    },
                    label: {
                        text: callsign,
                        font: '9pt Courier New',
                        fillColor: onGround ? Cesium.Color.YELLOW : Cesium.Color.LIME,
                        pixelOffset: new Cesium.Cartesian2(14, 0),
                        showBackground: true,
                        backgroundColor: Cesium.Color.fromCssColorString('rgba(0,0,0,0.75)'),
                        backgroundPadding: new Cesium.Cartesian2(4, 3),
                        verticalOrigin: Cesium.VerticalOrigin.CENTER
                    },
                    properties: {
                        layer: 'flights',
                        icao24, callsign, country,
                        alt: Math.round(alt),
                        speed, heading,
                        onGround,
                        aircraftType: null  // filled by loadDetails()
                    }
                });
                this._entities.push(e);
            });

            if (!layerEnabled.flights) this.hide();
            document.getElementById('btn-flights').innerText = `● FLIGHTS (${this._entities.length})`;

            // If details mode is on, load them automatically after refresh
            if (this._detailsEnabled) await this.loadDetails();

            return { count: this._entities.length };
        } catch(e) {
            console.warn('[flights] fetch failed:', e.message);
            document.getElementById('btn-flights').innerText = `● FLIGHTS (ERR)`;
            return { error: e.message };
        }
    },

    // Draw a simple arrow canvas for heading indicator
    _makeArrowCanvas(onGround) {
        const c = document.createElement('canvas');
        c.width = 20; c.height = 20;
        const ctx = c.getContext('2d');
        ctx.fillStyle = onGround ? '#ffff00' : '#00ff41';
        ctx.strokeStyle = 'rgba(0,0,0,0.6)';
        ctx.lineWidth = 1;
        // Arrow pointing up (north = 0 heading, rotation handles the rest)
        ctx.beginPath();
        ctx.moveTo(10, 1);   // tip
        ctx.lineTo(16, 16);  // right base
        ctx.lineTo(10, 13);  // centre notch
        ctx.lineTo(4, 16);   // left base
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        return c.toDataURL();
    },

    // Fetch aircraft type for all visible entities and update labels
    async loadDetails() {
        const btn = document.getElementById('btn-details');
        btn.innerText = 'LOADING...';
        let loaded = 0;

        for (const e of this._entities) {
            const icao24 = e.properties.icao24.getValue();
            if (!icao24) continue;

            // Use cache to avoid re-fetching
            if (!this._metadataCache[icao24]) {
                try {
                    const res = await fetch(`https://opensky-network.org/api/metadata/aircraft/icao24/${icao24}`);
                    if (res.ok) {
                        this._metadataCache[icao24] = await res.json();
                    }
                } catch(_) {}
                // Small delay to avoid hammering the API
                await new Promise(r => setTimeout(r, 80));
            }

            const meta = this._metadataCache[icao24];
            if (meta) {
                e.properties.aircraftType = meta.typecode || meta.model || '?';
                e.properties.registration = meta.registration || '?';
                e.properties.operator     = meta.operatorCallsign || meta.owner || '?';
                e.properties.manufacturer = meta.manufacturerName || '?';
                e.properties.built        = meta.built || '?';

                // Update label to show type
                const callsign = e.properties.callsign.getValue();
                const type     = e.properties.aircraftType;
                e.label.text   = new Cesium.ConstantProperty(`${callsign}\n${type}`);
                loaded++;
            }
        }

        btn.innerText = `DETAILS (${loaded})`;
        console.log(`[flights] loaded metadata for ${loaded} aircraft`);
    },

    show() { this._entities.forEach(e => e.show = true); },
    hide() { this._entities.forEach(e => e.show = false); },

    destroy() {
        if (this._viewer) this._entities.forEach(e => this._viewer.entities.remove(e));
        this._entities = [];
    }
};

// ─── LAYER: WEATHER (OpenWeatherMap — multiple independent layers) ────────────
const WeatherLayer = {
    id: 'weather',
    _viewer: null,
    // Each OWM layer type tracked independently
    _layers: {},  // layerType -> Cesium.ImageryLayer

    init(viewer) {
        this._viewer = viewer;
        console.log('[weather] standby — all layers off by default');
    },

    async loadLayer(layerType) {
        const v = this._viewer;
        if (!v || !OWM_KEY) { console.warn('[weather] no viewer or key'); return; }

        // Remove existing layer of this type if present
        if (this._layers[layerType]) {
            v.imageryLayers.remove(this._layers[layerType], true);
            delete this._layers[layerType];
        }

        const tileUrl = `https://tile.openweathermap.org/map/${layerType}/{z}/{x}/{y}.png?appid=${OWM_KEY}`;
        const provider = new Cesium.UrlTemplateImageryProvider({
            url: tileUrl,
            minimumLevel: 0,
            maximumLevel: 18,
            credit: 'OpenWeatherMap'
        });
        const layer = new Cesium.ImageryLayer(provider, { alpha: 0.65 });
        v.imageryLayers.add(layer);
        this._layers[layerType] = layer;
        console.log(`[weather] loaded: ${layerType}`);
    },

    removeLayer(layerType) {
        const v = this._viewer;
        if (!v || !this._layers[layerType]) return;
        v.imageryLayers.remove(this._layers[layerType], true);
        delete this._layers[layerType];
        console.log(`[weather] removed: ${layerType}`);
    },

    // show/hide/destroy satisfy the layer interface
    show() { Object.values(this._layers).forEach(l => l.show = true); },
    hide() { Object.values(this._layers).forEach(l => l.show = false); },
    refresh() {},
    destroy() {
        const v = this._viewer;
        if (!v) return;
        Object.values(this._layers).forEach(l => v.imageryLayers.remove(l, true));
        this._layers = {};
    }
};

// ─── LAYER: AIRSPACE ──────────────────────────────────────────────────────────
const AirspaceLayer = {
    id: 'airspace',
    _entities: [],
    _viewer: null,

    _airports: [
        { icao: 'EGLL', name: 'Heathrow',    lon: -0.4543, lat: 51.4775, radius: 15000, cls: 'A' },
        { icao: 'EGKK', name: 'Gatwick',     lon: -0.1903, lat: 51.1481, radius: 12000, cls: 'D' },
        { icao: 'EGLC', name: 'London City', lon:  0.0552, lat: 51.5053, radius:  6000, cls: 'D' },
        { icao: 'EGSS', name: 'Stansted',    lon:  0.2350, lat: 51.8850, radius: 12000, cls: 'D' },
        { icao: 'EGGW', name: 'Luton',       lon: -0.3683, lat: 51.8747, radius: 10000, cls: 'D' },
        { icao: 'EGMC', name: 'Southend',    lon:  0.6956, lat: 51.5713, radius:  8000, cls: 'D' },
    ],

    init(viewer) {
        this._viewer = viewer;
        return this.refresh();
    },

    refresh() {
        const v = this._viewer;
        if (!v) return;
        this._entities.forEach(e => v.entities.remove(e));
        this._entities = [];

        this._airports.forEach(ap => {
            const isA = ap.cls === 'A';
            const fillColor = isA
                ? Cesium.Color.fromCssColorString('rgba(255,50,50,0.12)')
                : Cesium.Color.fromCssColorString('rgba(50,150,255,0.10)');
            const outlineColor = isA
                ? Cesium.Color.fromCssColorString('rgba(255,80,80,0.9)')
                : Cesium.Color.fromCssColorString('rgba(80,180,255,0.8)');
            const labelColor = isA
                ? Cesium.Color.fromCssColorString('#ff8080')
                : Cesium.Color.fromCssColorString('#80ccff');

            const ctr = v.entities.add({
                position: Cesium.Cartesian3.fromDegrees(ap.lon, ap.lat, 0),
                ellipse: {
                    semiMinorAxis: ap.radius, semiMajorAxis: ap.radius,
                    material: fillColor, outline: true, outlineColor,
                    outlineWidth: 2,
                    height: 0
                    // No extrudedHeight — keeps them flat 2D rings, no 3D cylinders
                }
            });

            const lbl = v.entities.add({
                position: Cesium.Cartesian3.fromDegrees(ap.lon, ap.lat, 200),
                point: { pixelSize: 10, color: outlineColor, outlineColor: Cesium.Color.BLACK, outlineWidth: 1 },
                label: {
                    text: `${ap.icao}\nCLS ${ap.cls}`,
                    font: '9pt Courier New', fillColor: labelColor,
                    pixelOffset: new Cesium.Cartesian2(14, 0),
                    showBackground: true,
                    backgroundColor: Cesium.Color.fromCssColorString('rgba(0,0,0,0.75)'),
                    backgroundPadding: new Cesium.Cartesian2(4, 3)
                }
            });
            this._entities.push(ctr, lbl);
        });
        console.log('[airspace] loaded', this._airports.length, 'CTRs');
    },

    show() { this._entities.forEach(e => e.show = true); },
    hide() { this._entities.forEach(e => e.show = false); },
    destroy() {
        if (this._viewer) this._entities.forEach(e => this._viewer.entities.remove(e));
        this._entities = [];
    }
};

// ─── LAYER: TERRAIN/SATELLITE ─────────────────────────────────────────────────
// Esri satellite is the base layer on map-b — this layer controls the
// roads/transport reference overlay on top of it.
const TerrainLayer = {
    id: 'terrain',
    _roadsLayer: null,
    _viewer: null,

    init(viewer) {
        this._viewer = viewer;
        return this.refresh();
    },

    refresh() {
        const v = this._viewer;
        if (!v) return;
        if (this._roadsLayer) { v.imageryLayers.remove(this._roadsLayer, true); this._roadsLayer = null; }
        const roadsProvider = new Cesium.UrlTemplateImageryProvider({
            url: 'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}',
            credit: 'Esri',
            minimumLevel: 0,
            maximumLevel: 19
        });
        this._roadsLayer = new Cesium.ImageryLayer(roadsProvider, { alpha: 0.5 });
        v.imageryLayers.add(this._roadsLayer);
        console.log('[terrain] roads overlay loaded');
    },

    show() { if (this._roadsLayer) this._roadsLayer.show = true; },
    hide() { if (this._roadsLayer) this._roadsLayer.show = false; },
    destroy() {
        if (this._viewer && this._roadsLayer) {
            this._viewer.imageryLayers.remove(this._roadsLayer, true);
            this._roadsLayer = null;
        }
    }
};

// ─── PANE SETUP ───────────────────────────────────────────────────────────────
const PANE_CONFIG = [
    { id: 'map-a', label: 'FLIGHTS + AIRSPACE', layers: [FlightsLayer, AirspaceLayer] },
    { id: 'map-b', label: 'SATELLITE + WEATHER', layers: [TerrainLayer, WeatherLayer]  },
];

// Esri World Imagery — default base for both panes
function makeEsriSatelliteLayer() {
    return new Cesium.ImageryLayer(
        new Cesium.UrlTemplateImageryProvider({
            url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
            credit: 'Esri World Imagery',
            minimumLevel: 0,
            maximumLevel: 19
        })
    );
}

async function initPane(config) {
    // Both panes start with Esri satellite — switchable via sub-header buttons
    const initialLayer = makeEsriSatelliteLayer();
    const viewer = new Cesium.Viewer(config.id, {
        baseLayer: initialLayer,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        navigationHelpButton: false,
        animation: false,
        timeline: false,
        fullscreenButton: false,
        skyBox: false,
        skyAtmosphere: false,
    });

    // Register initial base layer so setBaseMap can replace it later
    const paneKey = config.id.replace('map-', '');
    paneBaseLayers[paneKey] = initialLayer;

    // Enable mouse/trackpad zoom on all panes
    viewer.scene.screenSpaceCameraController.enableZoom      = true;
    viewer.scene.screenSpaceCameraController.enableTranslate = true;
    viewer.scene.screenSpaceCameraController.enableRotate    = true;
    viewer.scene.screenSpaceCameraController.enableTilt      = false;
    viewer.scene.screenSpaceCameraController.zoomEventTypes  = [
        Cesium.CameraEventType.WHEEL,
        Cesium.CameraEventType.PINCH
    ];

    viewer.camera.setView({ destination: LONDON, orientation: LOOK_DOWN });

    const lbl = document.createElement('div');
    lbl.className = 'pane-label';
    lbl.innerText = `[ ${config.label} ]`;
    viewer.container.appendChild(lbl);

    viewers[config.id] = viewer;

    viewer.container.addEventListener('mouseenter', () => {
        activeMaster = config.id;
        updateStatusBar();
    });

    for (const layer of config.layers) {
        layer._viewer = viewer;
        await layer.init(viewer);
    }
}

// ─── CAMERA SYNC ─────────────────────────────────────────────────────────────
function setupCameraSync() {
    Object.keys(viewers).forEach(id => {
        viewers[id].scene.postRender.addEventListener(() => {
            if (id !== activeMaster) return;
            const cam  = viewers[id].camera;
            const dest = cam.position.clone();
            const dir  = cam.direction.clone();
            const up   = cam.up.clone();
            Object.keys(viewers).forEach(tid => {
                if (tid !== id) {
                    viewers[tid].camera.setView({ destination: dest, orientation: { direction: dir, up } });
                }
            });
            updateStatusBar();
        });
    });
}

function updateStatusBar() {
    const master = viewers[activeMaster];
    if (!master) return;
    const cart = master.camera.positionCartographic;
    const alt = cart ? (cart.height / 1000).toFixed(1) : '?';
    document.getElementById('status-master').innerText = `MASTER: ${activeMaster.toUpperCase().replace('-','_')}`;
    document.getElementById('status-alt').innerText = `ALT: ${alt}KM`;
}

// ─── LAYER TOGGLE ────────────────────────────────────────────────────────────
const layerModules = { flights: FlightsLayer, airspace: AirspaceLayer, terrain: TerrainLayer };

function toggleLayer(id) {
    layerEnabled[id] = !layerEnabled[id];
    const btn = document.getElementById(`btn-${id}`);
    if (layerEnabled[id]) {
        layerModules[id].show();
        btn.classList.add('active');
        btn.classList.remove('inactive');
    } else {
        layerModules[id].hide();
        btn.classList.remove('active');
        btn.classList.add('inactive');
    }
    updateInfoPanels();
}

// ─── BASE MAP STYLES ─────────────────────────────────────────────────────────
const BASE_MAP_STYLES = {
    satellite: () => new Cesium.UrlTemplateImageryProvider({
        url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        credit: 'Esri World Imagery', minimumLevel: 0, maximumLevel: 19
    }),
    positron: () => new Cesium.UrlTemplateImageryProvider({
        url: 'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
        credit: 'CartoDB Positron', minimumLevel: 0, maximumLevel: 19
    }),
    voyager: () => new Cesium.UrlTemplateImageryProvider({
        url: 'https://a.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',
        credit: 'CartoDB Voyager', minimumLevel: 0, maximumLevel: 19
    }),
    street: () => new Cesium.UrlTemplateImageryProvider({
        url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',
        credit: 'Esri World Street Map', minimumLevel: 0, maximumLevel: 19
    }),
    topo: () => new Cesium.UrlTemplateImageryProvider({
        url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}',
        credit: 'Esri World Topo', minimumLevel: 0, maximumLevel: 19
    }),
    dark: () => new Cesium.UrlTemplateImageryProvider({
        url: 'https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
        credit: 'CartoDB Dark Matter', minimumLevel: 0, maximumLevel: 19
    }),
};

// Track current base layer per pane so we can remove it on switch
const paneBaseLayers = { a: null, b: null };

function setBaseMap(paneId, styleKey, clickedBtn) {
    const viewer = viewers[`map-${paneId}`];
    if (!viewer) return;

    const providerFn = BASE_MAP_STYLES[styleKey];
    if (!providerFn) return;

    // Remove existing base layer
    if (paneBaseLayers[paneId]) {
        viewer.imageryLayers.remove(paneBaseLayers[paneId], true);
    }

    // Add new base layer at index 0 (bottom)
    const newLayer = new Cesium.ImageryLayer(providerFn());
    viewer.imageryLayers.add(newLayer, 0);
    paneBaseLayers[paneId] = newLayer;

    // Update button states in this pane's sub-header
    document.querySelectorAll(`#pane-${paneId} .map-style-btn`).forEach(b => {
        b.classList.remove('active');
    });
    clickedBtn.classList.add('active');
    paneBaseStyle[paneId] = styleKey;

    console.log(`[basemap] pane-${paneId} → ${styleKey}`);
    updateInfoPanels();
}

// ─── INFO PANELS ─────────────────────────────────────────────────────────────
const BASE_MAP_LABELS = {
    satellite: 'Esri World Imagery',
    positron:  'CartoDB Positron',
    voyager:   'CartoDB Voyager',
    street:    'Esri World Street Map',
    topo:      'Esri World Topo',
    dark:      'CartoDB Dark Matter',
};

// Track current base style per pane for the info panel
const paneBaseStyle = { a: 'satellite', b: 'satellite' };

function infoRow(key, val, active = false) {
    return `<div class="info-row">
        <span class="info-key">${key}</span>
        <span class="info-val${active ? ' active' : ''}">${val}</span>
    </div>`;
}
function infoDivider(label) {
    return `<div class="info-divider">─ ${label} ─</div>`;
}

function updateInfoPanels() {
    // ── PANE A ──────────────────────────────────────────
    const baseA = BASE_MAP_LABELS[paneBaseStyle.a] || paneBaseStyle.a;
    const flightsOn  = layerEnabled.flights;
    const airspaceOn = layerEnabled.airspace;
    const flightCount = FlightsLayer._entities?.length ?? 0;

    let aHtml = '';
    aHtml += infoDivider('BASE MAP');
    aHtml += infoRow('TILE', baseA, true);
    aHtml += infoRow('SRC', paneBaseStyle.a === 'satellite' || paneBaseStyle.a === 'street' || paneBaseStyle.a === 'topo' ? 'esri.com' : 'carto.com');

    aHtml += infoDivider('FLIGHT DATA');
    aHtml += infoRow('STATE', flightsOn ? 'ACTIVE' : 'OFF', flightsOn);
    aHtml += infoRow('SRC', 'opensky-network.org');
    aHtml += infoRow('META', 'opensky-network.org/api');
    aHtml += infoRow('PHOTO', 'planespotters.net');
    aHtml += infoRow('COUNT', flightsOn ? `${flightCount} ac` : '—');

    aHtml += infoDivider('AIRSPACE');
    aHtml += infoRow('STATE', airspaceOn ? 'ACTIVE' : 'OFF', airspaceOn);
    aHtml += infoRow('SRC', 'inline / static');
    aHtml += infoRow('CTRS', '6 UK airports');

    document.getElementById('info-a-body').innerHTML = aHtml;

    // ── PANE B ──────────────────────────────────────────
    const baseB = BASE_MAP_LABELS[paneBaseStyle.b] || paneBaseStyle.b;
    const roadsOn = layerEnabled.terrain;
    const activeLayers = Object.keys(WeatherLayer._layers);

    let bHtml = '';
    bHtml += infoDivider('BASE MAP');
    bHtml += infoRow('TILE', baseB, true);
    bHtml += infoRow('SRC', paneBaseStyle.b === 'satellite' || paneBaseStyle.b === 'street' || paneBaseStyle.b === 'topo' ? 'esri.com' : 'carto.com');

    bHtml += infoDivider('OVERLAYS');
    bHtml += infoRow('ROADS', roadsOn ? 'ON' : 'OFF', roadsOn);
    if (roadsOn) bHtml += infoRow('SRC', 'esri.com/transport');

    bHtml += infoDivider('WEATHER');
    bHtml += infoRow('SRC', 'openweathermap.org');
    bHtml += infoRow('API', 'maps/1.0/tile');
    bHtml += infoRow('KEY', OWM_KEY ? `${OWM_KEY.slice(0,4)}…${OWM_KEY.slice(-4)}` : 'NOT LOADED');
    if (activeLayers.length === 0) {
        bHtml += infoRow('LAYERS', 'NONE ACTIVE');
    } else {
        activeLayers.forEach(k => {
            bHtml += infoRow('▸', (OWM_LAYERS[k] || k), true);
        });
    }

    document.getElementById('info-b-body').innerHTML = bHtml;
}

// ─── PANEL TOGGLE ────────────────────────────────────────────────────────────
function togglePanel(panelId) {
    const panel = document.getElementById(panelId);
    panel.classList.toggle('open');
}

// Close panels when clicking on the map itself
document.addEventListener('click', (e) => {
    ['panel-a', 'panel-b'].forEach(id => {
        const panel = document.getElementById(id);
        if (!panel) return;
        const tab = panel.previousElementSibling;
        if (!panel.contains(e.target) && e.target !== tab) {
            panel.classList.remove('open');
        }
    });
});

// ─── WEATHER LAYER TOGGLES ────────────────────────────────────────────────────
// Maps OWM layer key → button ID (btn-weather-{key})
const OWM_LAYERS = {
    'precipitation_new':     'PRECIPITATION',
    'precipitation_classic': 'PRECIP CLASSIC',
    'rain_new':              'RAIN',
    'rain_classic':          'RAIN CLASSIC',
    'snow':                  'SNOW',
    'clouds_new':            'CLOUD COVER',
    'clouds_classic':        'CLOUD CLASSIC',
    'pressure_new':          'PRESSURE',
    'pressure_cntr':         'PRESSURE CONTOUR',
    'wind_new':              'WIND SPEED',
    'temp_new':              'TEMPERATURE',
};

async function toggleWeather(layerType) {
    const btn = document.getElementById(`btn-weather-${layerType}`);
    const isOn = WeatherLayer._layers[layerType];

    if (isOn) {
        WeatherLayer.removeLayer(layerType);
        btn.classList.remove('active');
        btn.classList.add('inactive');
    } else {
        const label = OWM_LAYERS[layerType] || layerType;
        btn.innerText = `◌ ${label}…`;
        await WeatherLayer.loadLayer(layerType);
        btn.innerText = `● ${label}`;
        btn.classList.add('active');
        btn.classList.remove('inactive');
    }
    updateInfoPanels();
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
async function manualRefreshFlights() {
    const btn = document.getElementById('refresh-btn');
    btn.innerText = 'FETCHING...';
    await FlightsLayer.refresh();
    btn.innerText = 'REFRESH';
}

async function toggleDetails() {
    FlightsLayer._detailsEnabled = !FlightsLayer._detailsEnabled;
    const btn = document.getElementById('btn-details');
    if (FlightsLayer._detailsEnabled) {
        btn.classList.add('active');
        btn.classList.remove('inactive');
        await FlightsLayer.loadDetails();
    } else {
        btn.classList.remove('active');
        btn.classList.add('inactive');
        btn.innerText = 'DETAILS';
        // Revert labels to callsign only
        FlightsLayer._entities.forEach(e => {
            const callsign = e.properties.callsign.getValue();
            e.label.text = new Cesium.ConstantProperty(callsign);
        });
    }
}

async function openPopup(entity) {
    const popup   = document.getElementById('aircraft-popup');
    const loading = document.getElementById('popup-loading');
    const body    = document.getElementById('popup-body');
    const photo   = document.getElementById('popup-photo');
    const credit  = document.getElementById('popup-photo-credit');

    const props    = entity.properties;
    const icao24   = props.icao24.getValue();
    const callsign = props.callsign.getValue();
    const alt      = props.alt.getValue();
    const speed    = props.speed.getValue();
    const heading  = props.heading.getValue();
    const country  = props.country.getValue();
    const onGround = props.onGround.getValue();

    document.getElementById('popup-callsign').innerText = callsign || icao24;
    popup.classList.add('visible');
    loading.style.display = 'block';
    body.innerHTML = '';
    photo.style.display = 'none';
    credit.innerText = '';

    // Fetch metadata if not cached
    let meta = FlightsLayer._metadataCache[icao24];
    if (!meta && icao24) {
        try {
            const res = await fetch(`https://opensky-network.org/api/metadata/aircraft/icao24/${icao24}`);
            if (res.ok) {
                meta = await res.json();
                FlightsLayer._metadataCache[icao24] = meta;
            }
        } catch(_) {}
    }

    // Fetch photo from Planespotters
    const registration = meta?.registration || '';
    if (registration) {
        try {
            const res = await fetch(`https://api.planespotters.net/pub/photos/reg/${registration}`);
            if (res.ok) {
                const pdata = await res.json();
                const firstPhoto = pdata.photos?.[0];
                if (firstPhoto) {
                    photo.src = firstPhoto.thumbnail_large?.src || firstPhoto.thumbnail?.src || '';
                    photo.style.display = 'block';
                    credit.innerText = `© ${firstPhoto.photographer || 'unknown'} via Planespotters`;
                }
            }
        } catch(_) {}
    }

    loading.style.display = 'none';

    // Build info rows
    const rows = [
        ['CALLSIGN',     callsign || '—'],
        ['ICAO24',       icao24 || '—'],
        ['REGISTRATION', meta?.registration || '—'],
        ['TYPE',         meta?.typecode || meta?.model || '—'],
        ['MANUFACTURER', meta?.manufacturerName || '—'],
        ['OPERATOR',     meta?.operatorCallsign || meta?.owner || '—'],
        ['BUILT',        meta?.built || '—'],
        ['COUNTRY',      country || '—'],
        ['STATUS',       onGround ? 'ON GROUND' : 'AIRBORNE'],
        ['ALTITUDE',     onGround ? '—' : `${alt}m`],
        ['SPEED',        `${speed}kt`],
        ['HEADING',      `${heading}°`],
    ];

    body.innerHTML = rows.map(([k, v]) =>
        `<div class="popup-row"><span class="popup-key">${k}</span><span class="popup-val">${v}</span></div>`
    ).join('');
}

function closePopup() {
    document.getElementById('aircraft-popup').classList.remove('visible');
}

function handleZoom(dir) {
    const master = viewers[activeMaster];
    if (!master) return;
    const h = master.camera.positionCartographic.height;
    dir === 'in' ? master.camera.zoomIn(h * 0.25) : master.camera.zoomOut(h * 0.25);
}

async function takeScreenshot() {
    const btn = document.getElementById('screenshot-btn');
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const grid = document.querySelector('.test-grid');
    canvas.width = grid.clientWidth;
    canvas.height = grid.clientHeight;
    const va = document.querySelector('#map-a canvas');
    if (va) ctx.drawImage(va, 0, 0, canvas.width / 2, canvas.height);
    const vb = document.querySelector('#map-b canvas');
    if (vb) ctx.drawImage(vb, canvas.width / 2, 0, canvas.width / 2, canvas.height);
    canvas.toBlob(async blob => {
        await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
        btn.innerText = 'COPIED!';
        setTimeout(() => btn.innerText = 'COPY_ALL', 2000);
    });
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
async function boot() {
    // Load OWM key from local file
    try {
        OWM_KEY = await fetch('key').then(r => r.text()).then(t => t.trim());
        console.log('[boot] OWM key loaded');
    } catch(e) {
        console.warn('[boot] Could not load key file — weather layer unavailable');
    }

    await Promise.all(PANE_CONFIG.map(initPane));
    setupCameraSync();
    updateStatusBar();

    // Apply initial disabled states
    Object.keys(layerEnabled).forEach(id => {
        if (!layerEnabled[id]) layerModules[id].hide();
    });

    updateInfoPanels();
    console.log('[boot] all panes ready');
}

boot();
