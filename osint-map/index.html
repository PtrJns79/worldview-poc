<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WORLDVIEW // OSINT DASHBOARD</title>
    <!-- Cesium JS Core -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <!-- Application Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="cesiumContainer"></div>
    
    <!-- UI Overlay (World View / Cyberpunk-Lite aesthetic) -->
    <div id="ui-panel">
        <div class="panel-header">WORLDVIEW_OSINT <span style="font-size:10px; color:#00cc33; float:right;">v2.0</span></div>
        
        <!-- Base Map Selector -->
        <div class="layer-control" style="border-bottom: 1px dotted #333; padding-bottom: 15px;">
            <select id="basemap-select" style="background: black; color:#4ade80; border:1px solid #333; width:100%; padding: 4px; font-family: monospace; font-size:11px;" onchange="window.OSINT.setBaseMap(this.value)">
                <option value="dark">Esri Dark Canvas</option>
                <option value="light">Esri Light Canvas</option>
                <option value="satellite" selected>Esri Satellite</option>
                <option value="google3d">Google Photorealistic 3D ✦</option>
            </select>
            <div id="google-key-row" style="display:none; margin-top:6px;">
                <input type="text" id="google-key-input" placeholder="Paste Google Maps API Key..." style="background:black;color:#ffaa00;border:1px solid #555;padding:3px;width:155px;font-family:monospace;font-size:10px;">
                <button onclick="window.OSINT.applyGoogle3D()" style="background:#333;color:#ffaa00;border:1px solid #555;cursor:pointer;padding:3px 6px;font-family:monospace;font-size:10px;">APPLY</button>
            </div>
        </div>

        <div class="panel-section">LIVE OSINT STREAMS</div>
        
        <div class="layer-control">
            <label style="color: #4ade80;"><input type="checkbox" onchange="window.OSINT.toggleLayer('flights', this.checked); document.getElementById('flights-filters').style.display = this.checked ? 'block' : 'none';"> FLIGHTS (COMMERCIAL & MIL)</label>
            <div class="layer-status" id="status-flights">STANDBY</div>
            
            <div id="flights-filters" style="display:none; margin-left: 20px; font-size: 0.85em; margin-top: 5px; color: #a3e635;">
                <label style="display:block; margin-bottom: 2px; color: #4ade80;"><input type="checkbox" onchange="window.FlightsLayer.updateFilters('heavy', this.checked)"> &gt; Heavy Commercial (Green)</label>
                <label style="display:block; margin-bottom: 2px; color: #a3e635;"><input type="checkbox" onchange="window.FlightsLayer.updateFilters('large', this.checked)"> &gt; Large / Regional (Lime)</label>
                <label style="display:block; margin-bottom: 2px; color: #60a5fa;"><input type="checkbox" checked onchange="window.FlightsLayer.updateFilters('small', this.checked)"> &gt; Small / Light (Blue)</label>
                <label style="display:block; margin-bottom: 2px; color: #fb923c;"><input type="checkbox" checked onchange="window.FlightsLayer.updateFilters('heli', this.checked)"> &gt; Helicopter (Orange)</label>
                <label style="display:block; margin-bottom: 2px; color: #ff00ff;"><input type="checkbox" checked onchange="window.FlightsLayer.updateFilters('emergency', this.checked)"> &gt; Emergency Services (Magenta)</label>
                <label style="display:block; margin-bottom: 2px; color: #ff4444;"><input type="checkbox" checked onchange="window.FlightsLayer.updateFilters('military', this.checked)"> &gt; Military (Red)</label>
            </div>
        </div>
        
        <div class="layer-control">
            <label style="color: #4ade80;"><input type="checkbox" onchange="window.OSINT.toggleLayer('earthquakes', this.checked)"> EARTHQUAKES (USGS)</label>
            <div class="layer-status" id="status-earthquakes">STANDBY</div>
        </div>
        
        <div class="layer-control">
            <label style="color: #4ade80;"><input type="checkbox" onchange="window.OSINT.toggleLayer('weather', this.checked)"> MET RADAR</label>
            <div class="layer-status" id="status-weather">STANDBY</div>
        </div>
        
        <div class="layer-control">
            <label style="color: #4ade80;"><input type="checkbox" onchange="window.OSINT.toggleLayer('satellites', this.checked)"> SATELLITE SURVEILLANCE & ISS</label>
            <div class="layer-status" id="status-satellites">STANDBY</div>
        </div>
        
        <div class="layer-control" style="margin-top: 15px;">
            <label style="color: #00ffff;"><input type="checkbox" onchange="window.OSINT.toggleLayer('airspace', this.checked); document.getElementById('airspace-filters').style.display = this.checked ? 'block' : 'none';"> AIRSPACE RESTRICTIONS</label>
            <div class="layer-status" id="status-airspace">STANDBY</div>

            <div id="airspace-filters" style="display:none; margin-left: 20px; font-size: 0.85em; margin-top: 5px;">
                <label style="display:block; margin-bottom: 2px; color: #4ade80;"><input type="checkbox" checked onchange="window.AirspaceLayer.updateFilters('civic', this.checked)"> &gt; Civic / Civil Aviation</label>
                <label style="display:block; margin-bottom: 2px; color: #ff4444;"><input type="checkbox" checked onchange="window.AirspaceLayer.updateFilters('military', this.checked)"> &gt; Military Restricted</label>
                <label style="display:block; margin-bottom: 2px; color: #00ffff;"><input type="checkbox" checked onchange="window.AirspaceLayer.updateFilters('fir', this.checked)"> &gt; Strategic FIR Zones</label>
            </div>
        </div>

        <div class="layer-control" style="margin-top: 15px;">
            <label style="color: #00ffff;"><input type="checkbox" onchange="window.OSINT.toggleLayer('ports', this.checked); document.getElementById('ports-filters').style.display = this.checked ? 'block' : 'none';"> WORLD PORTS (STRATEGIC)</label>
            <div class="layer-status" id="status-ports">STANDBY</div>

            <div id="ports-filters" style="display:none; margin-left: 20px; font-size: 0.85em; margin-top: 5px;">
                <label style="display:block; margin-bottom: 2px; color: #00ffff;"><input type="checkbox" checked onchange="window.PortsLayer.updateFilters('commercial', this.checked)"> &gt; Commercial (Cyan)</label>
                <label style="display:block; margin-bottom: 2px; color: #ff4444;"><input type="checkbox" checked onchange="window.PortsLayer.updateFilters('naval', this.checked)"> &gt; Naval / Military (Red)</label>
                <label style="display:block; margin-bottom: 2px; color: #ffaa00;"><input type="checkbox" checked onchange="window.PortsLayer.updateFilters('energy', this.checked)"> &gt; Energy Terminals (Orange)</label>
            </div>
        </div>

        <div class="layer-control" style="margin-top: 15px;">
            <label style="color: #4ade80;"><input type="checkbox" onchange="window.OSINT.toggleLayer('ais', this.checked); document.getElementById('ais-filters').style.display = this.checked ? 'block' : 'none';"> AIS MARITIME (BALTIC / N.SEA)</label>
            <div class="layer-status" id="status-ais">STANDBY</div>

            <div id="ais-filters" style="display:none; margin-left: 20px; font-size: 0.85em; margin-top: 5px;">
                <label style="display:block; margin-bottom: 2px; color: #4ade80;"><input type="checkbox" checked onchange="window.AISLayer.updateFilters('cargo', this.checked)"> &gt; Cargo (Green)</label>
                <label style="display:block; margin-bottom: 2px; color: #ff4444;"><input type="checkbox" checked onchange="window.AISLayer.updateFilters('tanker', this.checked)"> &gt; Tanker (Red)</label>
                <label style="display:block; margin-bottom: 2px; color: #60a5fa;"><input type="checkbox" checked onchange="window.AISLayer.updateFilters('passenger', this.checked)"> &gt; Passenger (Blue)</label>
                <label style="display:block; margin-bottom: 2px; color: #ff0000;"><input type="checkbox" checked onchange="window.AISLayer.updateFilters('naval', this.checked)"> &gt; Naval (Red)</label>
                <label style="display:block; margin-bottom: 2px; color: #888;"><input type="checkbox" onchange="window.AISLayer.updateFilters('unknown', this.checked)"> &gt; Unknown (Grey)</label>
            </div>
        </div>

        <div style="margin-top:20px; border-top: 1px dotted #333; padding-top:10px;">
            <input type="number" id="alt-input" placeholder="ALT (km)" onkeypress="if(event.key==='Enter') window.OSINT.setAltitude()" style="background: black; color: #00ffff; border: 1px solid #333; padding: 4px; width: 80px; font-family: monospace;">
            <button onclick="window.OSINT.setAltitude()" style="background: #333; color: #00ffff; border: 1px solid #555; cursor:pointer; padding: 4px 8px; font-family: monospace;">FLY</button>
        </div>

        <div style="margin-top:10px; border-top: 1px dotted #333; padding-top:10px;">
            <input type="text" id="asset-search" placeholder="SEARCH ID/CALLSIGN..." onkeypress="if(event.key === 'Enter') window.OSINT.searchAsset()" style="background: black; color: #a3e635; border: 1px solid #333; padding: 4px; width: 140px; font-family: monospace;">
            <button onclick="window.OSINT.searchAsset()" style="background: #333; color: white; border: 1px solid #555; cursor:pointer; padding: 4px 8px; font-family: monospace;">GO</button>
            <div id="search-result" style="color:#ff4444; font-size:10px; margin-top:5px; min-height:12px;"></div>
        </div>

        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button class="action-btn" onclick="window.OSINT.zoomIn()">[+]</button>
            <button class="icon-btn" onclick="window.OSINT.zoomOut()">[-]</button>
            <button class="icon-btn wide" onclick="window.OSINT.resetView()">RESET UK</button>
        </div>
    </div>

    <!-- Telemetry Overlay -->
    <div id="telemetry">
        ALT: <span id="tel-alt">---</span> KM | LAT: <span id="tel-lat">---</span> | LON: <span id="tel-lon">---</span>
    </div>

    <!-- Scripts -->
    <script src="js/registry.js"></script>
    <script src="js/layers/earthquakes.js"></script>
    <script src="js/layers/flights.js"></script>
    <script src="js/layers/weather.js"></script>
    <script src="js/layers/satellites.js"></script>
    <script src="js/layers/airspace.js"></script>
    <script src="js/layers/ports.js"></script>
    <script src="js/layers/ais_maritime.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
